name: Create Release and Build Exe

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0, v1.1.0

jobs:
  build:
    name: Build and Release ${{ matrix.variant }}
    runs-on: windows-latest # Must be Windows to build an .exe
    permissions:
      contents: write # Grant permission to create a release
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            requirements_file: requirements-cpu.txt
            asset_name: MinerU2PPT-win64-cpu.zip
          - variant: gpu-cu118
            requirements_file: requirements-gpu-cu118.txt
            asset_name: MinerU2PPT-win64-gpu-cu118.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ matrix.requirements_file }}

      - name: Build onedir package with PyInstaller spec
        run: pyinstaller --clean gui.spec

      - name: Archive onedir output
        run: |
          Compress-Archive -Path dist/MinerU2PPT/* -DestinationPath dist/${{ matrix.asset_name }} -Force
        shell: pwsh

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
