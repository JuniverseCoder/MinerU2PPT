name: Create Release and Build Exe

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0, v1.1.0

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.variant }}
    runs-on: windows-latest # Must be Windows to build an .exe
    permissions:
      contents: read
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            requirements_file: requirements-cpu.txt
            asset_name: MinerU2PPT-win64-cpu.zip
          - variant: gpu-cu118
            requirements_file: requirements-gpu-cu118.txt
            asset_name: MinerU2PPT-win64-gpu-cu118.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ${{ matrix.requirements_file }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ matrix.requirements_file }}

      - name: Build onedir package with PyInstaller spec
        run: pyinstaller --clean gui.spec

      - name: Archive onedir output
        run: |
          Compress-Archive -Path dist/MinerU2PPT/* -DestinationPath dist/${{ matrix.asset_name }} -Force
        shell: pwsh

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Create release and upload assets
    runs-on: windows-latest
    needs: build
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
